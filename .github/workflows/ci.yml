# CI: 품질 게이트 (린트 · 타입체크 · 빌드)
# 배포(CD)는 Vercel Git 연동이 담당한다 — PR은 프리뷰, main은 프로덕션.
name: CI

# 루트 문서만 바뀐 커밋은 CI를 태우지 않는다.
# 주의: src/content/**/*.md(약관)는 사이트에 렌더링되므로 여기에 넣지 말 것.
on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".env.example"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".env.example"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm 버전은 package.json의 packageManager 필드에서 읽는다
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
